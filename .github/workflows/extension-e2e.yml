name: Extension E2E

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]

jobs:
  e2e:
    name: Playwright (Chromium + Extension)
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bun
        uses: oven-sh/setup-bun@v1
        with:
          bun-version: latest

      - name: Install dependencies (extension)
        working-directory: extension
        run: bun install

      - name: Build extension
        working-directory: extension
        run: bun run build

      - name: Install Playwright Chromium and deps
        working-directory: extension
        run: |
          bun x playwright install --with-deps chromium

      - name: Run Playwright tests (xvfb)
        working-directory: extension
        run: |
          xvfb-run -a bun x playwright test --project=chromium-extension --reporter=dot

      - name: Upload test results (if failed)
        if: failure()
        uses: actions/upload-artifact@v4
        with:
          name: extension-test-results
          path: extension/test-results
          if-no-files-found: ignore

