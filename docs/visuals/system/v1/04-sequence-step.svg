<!--
  Sequence · Anatomy of a step · v1
  Canvas: 1600 × 900   · base unit: 8 px
  Actors (left→right): User · Planner · Broker · Worker · Native Host · Chrome Ext · Page
  Lifeline cx: 200 · 400 · 600 · 800 · 1000 · 1200 · 1400
  Time axis: y=348..720 (top → bottom = first → last)
  New vocabulary tested: actor headers · lifelines · activation bars · solid call · dashed return · loop frame
  Color slots: ink · surface · accent (RZN) · flow (Chrome)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- Filled call arrow (solid forward calls) -->
    <marker id="ah-call" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A17"/>
    </marker>
    <!-- Open thin V arrow (dashed returns) -->
    <marker id="ah-return" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0.5,0.5 L9.5,5 L0.5,9.5" fill="none" stroke="#1A1A17" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <!-- Canvas -->
  <rect width="1600" height="900" fill="#FAFAF7"/>

  <!-- ============================================================ -->
  <!-- HEADER BAND  (y: 80..240)                                    -->
  <!-- ============================================================ -->
  <text x="80" y="104"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700" letter-spacing="2.4"
        fill="#3A352D">RZN  ·  ARCHITECTURE  ·  03</text>

  <text x="80" y="160"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="36" font-weight="600" letter-spacing="-0.5"
        fill="#1A1A17">Anatomy of a step.</text>

  <text x="80" y="200"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="16" font-weight="400"
        fill="#3A352D">What happens, in order, when your task hits the runtime — intent travels right, result travels back left.</text>

  <!-- RZN monogram -->
  <g transform="translate(1488, 80)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#1A1A17"/>
    <text x="28" y="36" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="18" font-weight="800" letter-spacing="-0.4"
          fill="#C7E88F">RZN</text>
  </g>

  <line x1="80" y1="240" x2="1520" y2="240" stroke="#1A1A17" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- ============================================================ -->
  <!-- TIME AXIS HINT (left side, vertical)                         -->
  <!-- ============================================================ -->
  <g font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
     font-size="10" font-weight="700" letter-spacing="1.6"
     fill="#6F6A60">
    <text x="56" y="372" text-anchor="end">t₀</text>
    <text x="56" y="708" text-anchor="end">tₙ</text>
  </g>
  <line x1="64" y1="376" x2="64" y2="708" stroke="#6F6A60" stroke-width="0.6" stroke-dasharray="2 3"/>
  <!-- arrowhead at bottom of time axis -->
  <path d="M 60 704 L 64 712 L 68 704" fill="none" stroke="#6F6A60" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
  <text x="48" y="544" text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="10" font-weight="700" letter-spacing="2"
        fill="#6F6A60" transform="rotate(-90 48 544)">TIME →</text>

  <!-- ============================================================ -->
  <!-- ACTOR HEADERS  (y: 256..344)                                 -->
  <!-- 7 lifelines at cx = 200, 400, 600, 800, 1000, 1200, 1400     -->
  <!-- ============================================================ -->

  <!-- USER -->
  <g>
    <circle cx="200" cy="288" r="22" fill="#F4F1EA" stroke="#1A1A17" stroke-width="1.2"/>
    <g transform="translate(188, 276)" fill="none"
       stroke="#1A1A17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M19 21v-2a4 4 0 0 0-4-4H9a4 4 0 0 0-4 4v2"/>
      <circle cx="12" cy="7" r="4"/>
    </g>
    <text x="200" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">User</text>
  </g>

  <!-- PLANNER -->
  <g>
    <circle cx="400" cy="288" r="22" fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <g transform="translate(388, 276)" fill="none"
       stroke="#1A1A17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <path d="M12.22 2h-.44a2 2 0 0 0-2 2v.18a2 2 0 0 1-1 1.73l-.43.25a2 2 0 0 1-2 0l-.15-.08a2 2 0 0 0-2.73.73l-.22.38a2 2 0 0 0 .73 2.73l.15.1a2 2 0 0 1 1 1.72v.51a2 2 0 0 1-1 1.74l-.15.09a2 2 0 0 0-.73 2.73l.22.38a2 2 0 0 0 2.73.73l.15-.08a2 2 0 0 1 2 0l.43.25a2 2 0 0 1 1 1.73V20a2 2 0 0 0 2 2h.44a2 2 0 0 0 2-2v-.18a2 2 0 0 1 1-1.73l.43-.25a2 2 0 0 1 2 0l.15.08a2 2 0 0 0 2.73-.73l.22-.39a2 2 0 0 0-.73-2.73l-.15-.08a2 2 0 0 1-1-1.74v-.5a2 2 0 0 1 1-1.74l.15-.09a2 2 0 0 0 .73-2.73l-.22-.38a2 2 0 0 0-2.73-.73l-.15.08a2 2 0 0 1-2 0l-.43-.25a2 2 0 0 1-1-1.73V4a2 2 0 0 0-2-2z"/>
      <circle cx="12" cy="12" r="3"/>
    </g>
    <text x="400" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">Planner</text>
  </g>

  <!-- BROKER -->
  <g>
    <circle cx="600" cy="288" r="22" fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <g transform="translate(588, 276)" fill="none"
       stroke="#1A1A17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="18" cy="5" r="3"/>
      <circle cx="6" cy="12" r="3"/>
      <circle cx="18" cy="19" r="3"/>
      <line x1="8.59" y1="13.51" x2="15.42" y2="17.49"/>
      <line x1="15.41" y1="6.51" x2="8.59" y2="10.49"/>
    </g>
    <text x="600" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">Broker</text>
  </g>

  <!-- WORKER -->
  <g>
    <circle cx="800" cy="288" r="22" fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <g transform="translate(788, 276)" fill="none"
       stroke="#1A1A17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="4" y="4" width="16" height="16" rx="2"/>
      <rect x="9" y="9" width="6" height="6"/>
      <path d="M9 2v2"/><path d="M15 2v2"/>
      <path d="M9 20v2"/><path d="M15 20v2"/>
      <path d="M2 9h2"/><path d="M2 15h2"/>
      <path d="M20 9h2"/><path d="M20 15h2"/>
    </g>
    <text x="800" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">Worker</text>
  </g>

  <!-- NATIVE HOST -->
  <g>
    <circle cx="1000" cy="288" r="22" fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <g transform="translate(988, 276)" fill="none"
       stroke="#1A1A17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <polyline points="4 17 10 11 4 5"/>
      <line x1="12" y1="19" x2="20" y2="19"/>
    </g>
    <text x="1000" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">Native host</text>
  </g>

  <!-- CHROME EXT (brand glyph as identity, no separate circle) -->
  <g>
    <circle cx="1200" cy="288" r="22" fill="#E8F0FE" stroke="#1A4596" stroke-width="1.2"/>
    <g transform="translate(1200, 288)">
      <circle r="14" fill="#FAFAF7"/>
      <path d="M -14 0 A 14 14 0 0 1 7 -12.1 L 3.8 -6.4 A 7.6 7.6 0 0 0 -8.3 4.5 z" fill="#EA4335"/>
      <path d="M 7 -12.1 A 14 14 0 0 1 7 12.1 L 3.8 6.4 A 7.6 7.6 0 0 0 3.8 -6.4 z" fill="#FBBC04"/>
      <path d="M 7 12.1 A 14 14 0 0 1 -14 0 L -8.3 -4.5 A 7.6 7.6 0 0 0 3.8 6.4 z" fill="#34A853"/>
      <circle r="5.7" fill="#4285F4"/>
      <circle r="5.7" fill="none" stroke="#FAFAF7" stroke-width="1.2"/>
    </g>
    <text x="1200" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">Chrome ext.</text>
  </g>

  <!-- PAGE -->
  <g>
    <circle cx="1400" cy="288" r="22" fill="#FFFFFF" stroke="#3A352D" stroke-width="1.2"/>
    <g transform="translate(1388, 276)" fill="none"
       stroke="#1A1A17" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
      <rect x="2" y="3" width="20" height="14" rx="2"/>
      <line x1="8" y1="21" x2="16" y2="21"/>
      <line x1="12" y1="17" x2="12" y2="21"/>
    </g>
    <text x="1400" y="336" text-anchor="middle"
          font-family="Inter, sans-serif" font-size="13" font-weight="700"
          fill="#1A1A17">Target page</text>
  </g>

  <!-- ============================================================ -->
  <!-- LIFELINES (vertical dashed, behind everything else)          -->
  <!-- y: 348..720                                                  -->
  <!-- ============================================================ -->
  <g stroke="#1A1A17" stroke-width="1" stroke-opacity="0.30" stroke-dasharray="4 4">
    <line x1="200"  y1="348" x2="200"  y2="720"/>
    <line x1="400"  y1="348" x2="400"  y2="720"/>
    <line x1="600"  y1="348" x2="600"  y2="720"/>
    <line x1="800"  y1="348" x2="800"  y2="720"/>
    <line x1="1000" y1="348" x2="1000" y2="720"/>
    <line x1="1200" y1="348" x2="1200" y2="720"/>
    <line x1="1400" y1="348" x2="1400" y2="720"/>
  </g>

  <!-- ============================================================ -->
  <!-- ACTIVATION BARS  (semantic color per actor, drawn under arrows) -->
  <!-- ============================================================ -->
  <!-- USER:        active whole flow                               -->
  <rect x="196" y="376" width="8" height="332" fill="#3A352D" fill-opacity="0.45"/>
  <!-- PLANNER:     during M1..M2                                   -->
  <rect x="396" y="376" width="8" height="44"  fill="#3F6F1A" fill-opacity="0.55"/>
  <!-- BROKER:      after M2 through end                            -->
  <rect x="596" y="412" width="8" height="296" fill="#3F6F1A" fill-opacity="0.55"/>
  <!-- WORKER:      during loop step                                -->
  <rect x="796" y="472" width="8" height="200" fill="#3F6F1A" fill-opacity="0.55"/>
  <!-- NATIVE HOST: shorter inside worker                           -->
  <rect x="996" y="500" width="8" height="144" fill="#3F6F1A" fill-opacity="0.55"/>
  <!-- CHROME EXT:  shorter inside native host                      -->
  <rect x="1196" y="528" width="8" height="88"  fill="#1A4596" fill-opacity="0.55"/>
  <!-- PAGE:        shortest, the inner work                        -->
  <rect x="1396" y="556" width="8" height="32"  fill="#3A352D" fill-opacity="0.55"/>

  <!-- ============================================================ -->
  <!-- LOOP FRAME  (UML-style group around iterated messages)       -->
  <!-- y: 440..684, encloses cols Broker..Page                      -->
  <!-- ============================================================ -->
  <g>
    <rect x="568" y="440" width="864" height="244"
          fill="none" stroke="#3A352D" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3 3"/>
    <!-- corner tab with label -->
    <path d="M 568 440 L 568 464 L 720 464 L 728 456 L 728 440 z"
          fill="#FAFAF7" stroke="#3A352D" stroke-width="0.8" stroke-opacity="0.5"/>
    <text x="580" y="457"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="10" font-weight="700" letter-spacing="1.6"
          fill="#3A352D">LOOP  ·  FOR EACH STEP IN PLAN</text>
  </g>

  <!-- ============================================================ -->
  <!-- MESSAGES                                                     -->
  <!-- Solid arrow = call (forward) · Dashed arrow = return         -->
  <!-- Label above arrow (mono 11px) with surface backplate         -->
  <!-- ============================================================ -->

  <!-- M1 · USER → PLANNER  (call)  y=380 -->
  <line x1="208" y1="380" x2="392" y2="380" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
  <rect x="266" y="362" width="68" height="14" rx="3" fill="#FBFAF4"/>
  <text x="300" y="372" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700"
        fill="#1A1A17">your task</text>

  <!-- M2 · PLANNER → BROKER  (call)  y=416 -->
  <line x1="408" y1="416" x2="592" y2="416" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
  <rect x="464" y="398" width="72" height="14" rx="3" fill="#FBFAF4"/>
  <text x="500" y="408" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700"
        fill="#1A1A17">step queue</text>

  <!-- M3 · BROKER → WORKER  (call)  y=480, inside loop -->
  <line x1="608" y1="480" x2="792" y2="480" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
  <rect x="668" y="462" width="64" height="14" rx="3" fill="#FBFAF4"/>
  <text x="700" y="472" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700"
        fill="#1A1A17">dispatch</text>

  <!-- M4 · WORKER → NATIVE HOST  (call)  y=508 -->
  <line x1="808" y1="508" x2="992" y2="508" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
  <rect x="868" y="490" width="64" height="14" rx="3" fill="#FBFAF4"/>
  <text x="900" y="500" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700"
        fill="#1A1A17">command</text>

  <!-- M5 · NATIVE HOST → CHROME EXT  (call)  y=536 -->
  <line x1="1008" y1="536" x2="1192" y2="536" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
  <rect x="1062" y="518" width="76" height="14" rx="3" fill="#FBFAF4"/>
  <text x="1100" y="528" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700"
        fill="#1A1A17">native msg</text>

  <!-- M6 · CHROME EXT → PAGE  (call)  y=564 -->
  <line x1="1208" y1="564" x2="1392" y2="564" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
  <rect x="1252" y="546" width="96" height="14" rx="3" fill="#FBFAF4"/>
  <text x="1300" y="556" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700"
        fill="#1A1A17">chrome.tabs.*</text>

  <!-- M7 · PAGE → CHROME EXT  (return, dashed)  y=592 -->
  <line x1="1392" y1="592" x2="1208" y2="592" stroke="#1A1A17" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-return)"/>
  <rect x="1272" y="574" width="56" height="14" rx="3" fill="#FBFAF4"/>
  <text x="1300" y="584" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500"
        fill="#3A352D">DOM event</text>

  <!-- M8 · CHROME EXT → NATIVE HOST  (return)  y=620 -->
  <line x1="1192" y1="620" x2="1008" y2="620" stroke="#1A1A17" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-return)"/>
  <rect x="1080" y="602" width="40" height="14" rx="3" fill="#FBFAF4"/>
  <text x="1100" y="612" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500"
        fill="#3A352D">reply</text>

  <!-- M9 · NATIVE HOST → WORKER  (return)  y=648 -->
  <line x1="992" y1="648" x2="808" y2="648" stroke="#1A1A17" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-return)"/>
  <rect x="884" y="630" width="32" height="14" rx="3" fill="#FBFAF4"/>
  <text x="900" y="640" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500"
        fill="#3A352D">ack</text>

  <!-- M10 · WORKER → BROKER  (return)  y=676 -->
  <line x1="792" y1="676" x2="608" y2="676" stroke="#1A1A17" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-return)"/>
  <rect x="676" y="658" width="48" height="14" rx="3" fill="#FBFAF4"/>
  <text x="700" y="668" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500"
        fill="#3A352D">step ok</text>

  <!-- M11 · BROKER → USER  (return, spans cols, outside loop)  y=708 -->
  <line x1="592" y1="708" x2="208" y2="708" stroke="#1A1A17" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-return)"/>
  <rect x="364" y="690" width="72" height="14" rx="3" fill="#FBFAF4"/>
  <text x="400" y="700" text-anchor="middle"
        font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="500"
        fill="#3A352D">complete</text>

  <!-- ============================================================ -->
  <!-- LEGEND  (y: 752..820)                                        -->
  <!-- ============================================================ -->
  <line x1="80" y1="744" x2="1520" y2="744" stroke="#1A1A17" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="2 4"/>

  <g transform="translate(80, 776)">
    <text x="0" y="0"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="11" font-weight="700" letter-spacing="2"
          fill="#3A352D">LEGEND</text>

    <!-- swatch 1: solid arrow = call -->
    <g transform="translate(0, 24)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-call)"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">call (forward in time)</text>
    </g>

    <!-- swatch 2: dashed arrow = return -->
    <g transform="translate(280, 24)">
      <line x1="0" y1="10" x2="40" y2="10" stroke="#1A1A17" stroke-width="1.3" stroke-dasharray="5 4" marker-end="url(#ah-return)"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">return (response back)</text>
    </g>

    <!-- swatch 3: activation bar -->
    <g transform="translate(560, 24)">
      <rect x="14" y="0" width="8" height="20" fill="#3F6F1A" fill-opacity="0.55"/>
      <line x1="18" y1="-4" x2="18" y2="24" stroke="#1A1A17" stroke-width="1" stroke-opacity="0.30" stroke-dasharray="4 4"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">activation (actor is busy)</text>
    </g>

    <!-- swatch 4: loop frame -->
    <g transform="translate(840, 24)">
      <rect x="0" y="0" width="40" height="20" fill="none" stroke="#3A352D" stroke-width="0.8" stroke-opacity="0.5" stroke-dasharray="3 3"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">loop frame (control flow)</text>
    </g>

    <!-- swatch 5: time axis cue -->
    <g transform="translate(1120, 24)">
      <line x1="20" y1="-2" x2="20" y2="22" stroke="#6F6A60" stroke-width="0.6" stroke-dasharray="2 3"/>
      <path d="M 16 18 L 20 24 L 24 18" fill="none" stroke="#6F6A60" stroke-width="0.8" stroke-linecap="round" stroke-linejoin="round"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">time → (top to bottom)</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- FOOTER                                                       -->
  <!-- ============================================================ -->
  <text x="80" y="876"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="500" letter-spacing="1.5"
        fill="#6F6A60">RZN BROWSER AUTOMATION  ·  SEQUENCE  ·  v1</text>
  <text x="1520" y="876" text-anchor="end"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="500" letter-spacing="1.5"
        fill="#6F6A60">ONE STEP  ·  INTENT TO DOM AND BACK</text>
</svg>
