<!--
  Product Overview · v1 · grid-built
  Canvas: 1600 × 900   · base unit: 8 px
  Zones: USER (200) · RUNTIME container (720) · CHROME (200) · TARGET (176)
  Inter-zone gap: 48 px · Outer margin: 80 px
  Color slots used: ink · surface · accent (RZN) · flow (Chrome)
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900">
  <defs>
    <!-- Trust-boundary texture: faint diagonal hatch -->
    <pattern id="boundaryHatch" x="0" y="0" width="10" height="10" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="10" height="10" fill="#FBFAF4"/>
      <line x1="0" y1="0" x2="0" y2="10" stroke="#1A1A17" stroke-width="0.4" stroke-opacity="0.14"/>
    </pattern>

    <!-- Arrowheads, one per edge kind -->
    <marker id="ah-flow" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1A1A17"/>
    </marker>
    <marker id="ah-feedback" viewBox="0 0 10 10" refX="9.5" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3F6F1A"/>
    </marker>
  </defs>

  <!-- Canvas: surface -->
  <rect width="1600" height="900" fill="#FAFAF7"/>

  <!-- ============================================================ -->
  <!-- HEADER BAND                                                  -->
  <!-- y: 80 .. 240                                                 -->
  <!-- ============================================================ -->

  <!-- Eyebrow (meta) -->
  <text x="80" y="104"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700" letter-spacing="2.4"
        fill="#3A352D">RZN  ·  ARCHITECTURE  ·  01</text>

  <!-- Headline (display) -->
  <text x="80" y="160"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="36" font-weight="600" letter-spacing="-0.5"
        fill="#1A1A17">Browser automation that runs on the Chrome you already have.</text>

  <!-- Subhead (caption) -->
  <text x="80" y="200"
        font-family="Inter, -apple-system, system-ui, sans-serif"
        font-size="16" font-weight="400"
        fill="#3A352D">A local runtime, a small native bridge, and a Chrome extension that rides inside your real browser session.</text>

  <!-- RZN monogram (top-right) -->
  <g transform="translate(1488, 80)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#1A1A17"/>
    <text x="28" y="36" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="18" font-weight="800" letter-spacing="-0.4"
          fill="#C7E88F">RZN</text>
  </g>

  <!-- Section rule -->
  <line x1="80" y1="240" x2="1520" y2="240" stroke="#1A1A17" stroke-width="0.5" stroke-opacity="0.25"/>

  <!-- ============================================================ -->
  <!-- STAGE LABELS                                                 -->
  <!-- y: 240 .. 280                                                -->
  <!-- ============================================================ -->
  <g font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
     font-size="11" font-weight="700" letter-spacing="2.4"
     fill="#3A352D">
    <!-- Centered above each zone -->
    <text x="180"  y="264" text-anchor="middle">USER</text>
    <text x="688"  y="264" text-anchor="middle">RZN RUNTIME  ·  LOCAL</text>
    <text x="1196" y="264" text-anchor="middle">GOOGLE CHROME</text>
    <text x="1432" y="264" text-anchor="middle">TARGET</text>
  </g>

  <!-- ============================================================ -->
  <!-- FLOW BAND                                                    -->
  <!-- y: 304 .. 736                                                -->
  <!-- ============================================================ -->

  <!-- RZN RUNTIME container (trust boundary) -->
  <!-- x: 328..1048 (w=720), y: 304..736 (h=432) -->
  <g>
    <rect x="328" y="304" width="720" height="432" rx="20"
          fill="url(#boundaryHatch)"
          stroke="#1A1A17" stroke-width="1" stroke-dasharray="6 4"/>
    <!-- Container label tab (sits on top edge, breaks the dash) -->
    <rect x="352" y="292" width="200" height="24" rx="6"
          fill="#FAFAF7" stroke="#1A1A17" stroke-width="0.8"/>
    <text x="368" y="308"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="11" font-weight="700" letter-spacing="2"
          fill="#1A1A17">YOUR LOCAL MACHINE</text>
  </g>

  <!-- USER TASK · capsule -->
  <!-- x: 80..280 (w=200), y: 480..560 (h=80) · center y=520 -->
  <g>
    <rect x="80" y="480" width="200" height="80" rx="40"
          fill="#F4F1EA" stroke="#1A1A17" stroke-width="1.2"/>
    <text x="180" y="514" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="17" font-weight="700" letter-spacing="-0.1"
          fill="#1A1A17">User task</text>
    <text x="180" y="538" text-anchor="middle"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="12" font-weight="500"
          fill="#3A352D">CLI · workflow · SDK</text>
  </g>

  <!-- RZN RUNTIME (pill 1) · capsule-cylinder -->
  <!-- x: 360..1016 (w=656), y: 336..416 (h=80) · center y=376 -->
  <g>
    <rect x="360" y="336" width="656" height="80" rx="40"
          fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <!-- end-bars -->
    <line x1="384" y1="352" x2="384" y2="400" stroke="#3F6F1A" stroke-width="1.2"/>
    <line x1="992" y1="352" x2="992" y2="400" stroke="#3F6F1A" stroke-width="1.2"/>
    <text x="688" y="370" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="17" font-weight="700" letter-spacing="-0.1"
          fill="#1A1A17">RZN Runtime</text>
    <text x="688" y="394" text-anchor="middle"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="12" font-weight="600"
          fill="#26500D">planner  ·  worker  ·  broker</text>
  </g>

  <!-- RZN NATIVE HOST (pill 2) · capsule-cylinder -->
  <!-- x: 360..1016 (w=656), y: 480..560 (h=80) · center y=520 -->
  <g>
    <rect x="360" y="480" width="656" height="80" rx="40"
          fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <line x1="384" y1="496" x2="384" y2="544" stroke="#3F6F1A" stroke-width="1.2"/>
    <line x1="992" y1="496" x2="992" y2="544" stroke="#3F6F1A" stroke-width="1.2"/>
    <text x="688" y="514" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="17" font-weight="700" letter-spacing="-0.1"
          fill="#1A1A17">RZN Native Host</text>
    <text x="688" y="538" text-anchor="middle"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="12" font-weight="600"
          fill="#26500D">native messaging bridge</text>
  </g>

  <!-- RZN CHROME EXTENSION (pill 3) · capsule-cylinder -->
  <!-- x: 360..1016 (w=656), y: 624..704 (h=80) · center y=664 -->
  <g>
    <rect x="360" y="624" width="656" height="80" rx="40"
          fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
    <line x1="384" y1="640" x2="384" y2="688" stroke="#3F6F1A" stroke-width="1.2"/>
    <line x1="992" y1="640" x2="992" y2="688" stroke="#3F6F1A" stroke-width="1.2"/>
    <text x="688" y="658" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="17" font-weight="700" letter-spacing="-0.1"
          fill="#1A1A17">RZN Chrome Extension</text>
    <text x="688" y="682" text-anchor="middle"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="12" font-weight="600"
          fill="#26500D">rides inside your Chrome</text>
  </g>

  <!-- GOOGLE CHROME · capsule (external surface, flow palette) -->
  <!-- x: 1096..1296 (w=200), y: 480..560 (h=80) · center y=520 -->
  <!-- brand glyph at cx=1132 (left of text); title + caption left-aligned at x=1156 -->
  <g>
    <rect x="1096" y="480" width="200" height="80" rx="40"
          fill="#E8F0FE" stroke="#1A4596" stroke-width="1.2"/>
    <!-- Chrome multi-color brand glyph (Google brand colors, radius 14) -->
    <g transform="translate(1132, 520)">
      <circle r="14" fill="#FAFAF7"/>
      <path d="M -14 0 A 14 14 0 0 1 7 -12.1 L 3.8 -6.4 A 7.6 7.6 0 0 0 -8.3 4.5 z" fill="#EA4335"/>
      <path d="M 7 -12.1 A 14 14 0 0 1 7 12.1 L 3.8 6.4 A 7.6 7.6 0 0 0 3.8 -6.4 z" fill="#FBBC04"/>
      <path d="M 7 12.1 A 14 14 0 0 1 -14 0 L -8.3 -4.5 A 7.6 7.6 0 0 0 3.8 6.4 z" fill="#34A853"/>
      <circle r="5.7" fill="#4285F4"/>
      <circle r="5.7" fill="none" stroke="#FAFAF7" stroke-width="1.2"/>
    </g>
    <text x="1156" y="514" text-anchor="start"
          font-family="Inter, sans-serif"
          font-size="17" font-weight="700" letter-spacing="-0.1"
          fill="#1A1A17">Google Chrome</text>
    <text x="1156" y="538" text-anchor="start"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="12" font-weight="600"
          fill="#1A4596">your profile</text>
  </g>

  <!-- TARGET WEB APP · card -->
  <!-- x: 1344..1520 (w=176), y: 456..584 (h=128) · center y=520 -->
  <g>
    <rect x="1344" y="456" width="176" height="128" rx="8"
          fill="#FFFFFF" stroke="#3A352D" stroke-width="1.2"/>
    <!-- browser chrome bar -->
    <rect x="1344" y="456" width="176" height="20" rx="8" fill="#1A1A17" fill-opacity="0.06"/>
    <rect x="1344" y="468" width="176" height="8" fill="#1A1A17" fill-opacity="0.06"/>
    <circle cx="1356" cy="466" r="2.4" fill="#1A1A17" fill-opacity="0.4"/>
    <circle cx="1366" cy="466" r="2.4" fill="#1A1A17" fill-opacity="0.4"/>
    <circle cx="1376" cy="466" r="2.4" fill="#1A1A17" fill-opacity="0.4"/>
    <!-- page content lines -->
    <rect x="1360" y="492" width="80" height="6" rx="2" fill="#1A1A17" fill-opacity="0.20"/>
    <rect x="1360" y="508" width="120" height="3" rx="1" fill="#1A1A17" fill-opacity="0.14"/>
    <rect x="1360" y="516" width="104" height="3" rx="1" fill="#1A1A17" fill-opacity="0.14"/>
    <rect x="1360" y="524" width="116" height="3" rx="1" fill="#1A1A17" fill-opacity="0.14"/>
    <rect x="1360" y="544" width="48" height="14" rx="3" fill="#3F6F1A" fill-opacity="0.55"/>
    <text x="1432" y="572" text-anchor="middle"
          font-family="Inter, sans-serif"
          font-size="12" font-weight="700" letter-spacing="0.5"
          fill="#1A1A17">Target web app</text>
  </g>

  <!-- ============================================================ -->
  <!-- EDGES                                                        -->
  <!-- ============================================================ -->

  <!-- 1. USER → RZN RUNTIME pill (flow) -->
  <!-- (280,520) → (304,520) → (304,376) → (360,376) -->
  <path d="M 280 520 L 296 520 Q 304 520 304 512 L 304 384 Q 304 376 312 376 L 360 376"
        fill="none" stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-flow)"/>
  <!-- Edge label, beside curve, above horizontal segment -->
  <text x="296" y="510"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700"
        fill="#1A1A17">routes locally</text>

  <!-- 2. RZN RUNTIME → RZN NATIVE HOST (flow, internal) -->
  <!-- (688, 416) → (688, 480) -->
  <line x1="688" y1="416" x2="688" y2="476"
        stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-flow)"/>
  <!-- Edge label · backplate -->
  <rect x="700" y="436" width="32" height="20" rx="3" fill="#FBFAF4"/>
  <text x="716" y="450"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700"
        fill="#1A1A17" text-anchor="middle">IPC</text>

  <!-- 3. RZN NATIVE HOST → RZN CHROME EXTENSION (flow, internal) -->
  <!-- (688, 560) → (688, 624) -->
  <line x1="688" y1="560" x2="688" y2="620"
        stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-flow)"/>
  <rect x="700" y="580" width="96" height="20" rx="3" fill="#FBFAF4"/>
  <text x="748" y="594"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700"
        fill="#1A1A17" text-anchor="middle">native messaging</text>

  <!-- 4. RZN CHROME EXTENSION → GOOGLE CHROME (feedback · accent) -->
  <!-- (1016, 664) → (1056, 664) → (1056, 520) → (1096, 520) -->
  <path d="M 1016 664 L 1048 664 Q 1056 664 1056 656 L 1056 528 Q 1056 520 1064 520 L 1096 520"
        fill="none" stroke="#3F6F1A" stroke-width="1.8" marker-end="url(#ah-feedback)"/>
  <!-- Edge label -->
  <text x="1064" y="610"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700"
        fill="#26500D">attaches to real browser</text>

  <!-- 5. GOOGLE CHROME → TARGET WEB (flow) -->
  <!-- (1296, 520) → (1344, 520) -->
  <line x1="1296" y1="520" x2="1340" y2="520"
        stroke="#1A1A17" stroke-width="1.5" marker-end="url(#ah-flow)"/>
  <text x="1318" y="510" text-anchor="middle"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="700"
        fill="#1A1A17">DOM</text>

  <!-- ============================================================ -->
  <!-- LEGEND  (y: 768 .. 848)                                      -->
  <!-- ============================================================ -->
  <line x1="80" y1="768" x2="1520" y2="768" stroke="#1A1A17" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="2 4"/>

  <g transform="translate(80, 800)">
    <text x="0" y="0"
          font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
          font-size="11" font-weight="700" letter-spacing="2"
          fill="#3A352D">LEGEND</text>

    <!-- swatch 1: RZN-authored capsule-cylinder -->
    <g transform="translate(0, 24)">
      <rect x="0" y="0" width="40" height="20" rx="10" fill="#F4FAEB" stroke="#3F6F1A" stroke-width="1.2"/>
      <line x1="6" y1="3" x2="6" y2="17" stroke="#3F6F1A" stroke-width="1.2"/>
      <line x1="34" y1="3" x2="34" y2="17" stroke="#3F6F1A" stroke-width="1.2"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">RZN-authored runtime component</text>
    </g>

    <!-- swatch 2: external-surface capsule -->
    <g transform="translate(380, 24)">
      <rect x="0" y="0" width="40" height="20" rx="10" fill="#E8F0FE" stroke="#1A4596" stroke-width="1.2"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">external surface (your Chrome)</text>
    </g>

    <!-- swatch 3: passive-artifact card -->
    <g transform="translate(720, 24)">
      <rect x="0" y="0" width="40" height="20" rx="4" fill="#FFFFFF" stroke="#3A352D" stroke-width="1.2"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">passive artifact (page being acted on)</text>
    </g>

    <!-- swatch 4: trust-boundary container -->
    <g transform="translate(1080, 24)">
      <rect x="0" y="0" width="40" height="20" rx="4" fill="url(#boundaryHatch)" stroke="#1A1A17" stroke-width="0.8" stroke-dasharray="3 2"/>
      <text x="52" y="14" font-family="Inter, sans-serif" font-size="13" font-weight="500" fill="#1A1A17">your local machine</text>
    </g>
  </g>

  <!-- ============================================================ -->
  <!-- FOOTER                                                       -->
  <!-- ============================================================ -->
  <text x="80" y="876"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="500" letter-spacing="1.5"
        fill="#6F6A60">RZN BROWSER AUTOMATION  ·  PRODUCT OVERVIEW  ·  v1</text>
  <text x="1520" y="876" text-anchor="end"
        font-family="'IBM Plex Mono', ui-monospace, Menlo, monospace"
        font-size="11" font-weight="500" letter-spacing="1.5"
        fill="#6F6A60">LOCAL RUNTIME  ·  REAL BROWSER SESSION</text>
</svg>
