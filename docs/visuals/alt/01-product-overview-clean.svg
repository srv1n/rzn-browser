<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 880" width="1600" height="880" font-family="Inter, -apple-system, system-ui, 'Segoe UI', sans-serif">
  <defs>
    <filter id="softShadow" x="-10%" y="-10%" width="120%" height="130%">
      <feDropShadow dx="0" dy="2" stdDeviation="3" flood-color="#0f0f0f" flood-opacity="0.08"/>
    </filter>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#2D2B26"/>
    </marker>
    <marker id="arrowBlue" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="8" markerHeight="8" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#4285F4"/>
    </marker>
    <linearGradient id="gChrome" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#e8f0fe"/>
    </linearGradient>
    <linearGradient id="gRzn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#ffffff"/>
      <stop offset="100%" stop-color="#eaf6d9"/>
    </linearGradient>
  </defs>

  <rect width="1600" height="880" fill="#FAFAF7"/>

  <!-- Header -->
  <g transform="translate(80, 60)">
    <!-- RZN monogram badge -->
    <g>
      <rect x="0" y="0" width="48" height="48" rx="12" fill="#22211d"/>
      <text x="24" y="32" text-anchor="middle" font-size="20" font-weight="800" fill="#c7e88f" letter-spacing="-0.5">RZN</text>
    </g>
    <text x="66" y="32" font-size="30" font-weight="700" fill="#1a1a17" letter-spacing="-0.5">RZN Browser Automation <tspan fill="#9a9388" font-weight="500">— Product Overview</tspan></text>
    <text x="66" y="62" font-size="15" font-weight="500" fill="#6f6a60">Local runtime, real browser session. RZN automates the Chrome you already use.</text>
  </g>

  <!-- Lane 1: User / Entry Point -->
  <g>
    <rect x="60" y="160" width="1480" height="140" rx="18" fill="#ffffff" stroke="#e5e3dc" stroke-width="1"/>
    <text x="84" y="192" font-size="13" font-weight="700" fill="#6f6a60" letter-spacing="1.2">USER / ENTRY POINT</text>
    <!-- User task pill -->
    <g filter="url(#softShadow)">
      <rect x="110" y="220" width="240" height="62" rx="12" fill="#ffffff" stroke="#d9d6cd" stroke-width="1.5"/>
      <text x="230" y="258" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a17">User task</text>
    </g>
    <text x="370" y="245" font-size="13" font-weight="500" fill="#6f6a60">CLI · workflow · SDK · agent task</text>
    <text x="370" y="265" font-size="12" font-weight="500" fill="#9a9388">your request enters the local runtime</text>
  </g>

  <!-- Lane 2: RZN Runtime -->
  <g>
    <rect x="60" y="320" width="1480" height="200" rx="18" fill="#fbfbf6" stroke="#cce0a2" stroke-width="1"/>
    <g>
      <rect x="80" y="338" width="10" height="18" rx="3" fill="#8ac24c"/>
      <text x="98" y="353" font-size="13" font-weight="700" fill="#4a6d1f" letter-spacing="1.2">RZN RUNTIME</text>
    </g>

    <!-- RZN Runtime box -->
    <g filter="url(#softShadow)">
      <rect x="200" y="390" width="280" height="110" rx="14" fill="url(#gRzn)" stroke="#8ac24c" stroke-width="1.5"/>
      <rect x="216" y="406" width="26" height="26" rx="6" fill="#22211d"/>
      <text x="229" y="425" text-anchor="middle" font-size="11" font-weight="800" fill="#c7e88f">R</text>
      <text x="340" y="450" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a17">RZN Runtime</text>
      <text x="340" y="475" text-anchor="middle" font-size="12" font-weight="500" fill="#6f6a60">planner · worker · broker</text>
    </g>

    <!-- Native Host -->
    <g filter="url(#softShadow)">
      <rect x="560" y="390" width="280" height="110" rx="14" fill="url(#gRzn)" stroke="#8ac24c" stroke-width="1.5"/>
      <rect x="576" y="406" width="26" height="26" rx="6" fill="#22211d"/>
      <text x="589" y="425" text-anchor="middle" font-size="11" font-weight="800" fill="#c7e88f">R</text>
      <text x="700" y="450" text-anchor="middle" font-size="21" font-weight="700" fill="#1a1a17">RZN Native Host</text>
      <text x="700" y="475" text-anchor="middle" font-size="12" font-weight="500" fill="#6f6a60">native messaging bridge</text>
    </g>

    <!-- Chrome Extension (RZN) -->
    <g filter="url(#softShadow)">
      <rect x="920" y="390" width="280" height="110" rx="14" fill="url(#gRzn)" stroke="#8ac24c" stroke-width="1.5"/>
      <rect x="936" y="406" width="26" height="26" rx="6" fill="#22211d"/>
      <text x="949" y="425" text-anchor="middle" font-size="11" font-weight="800" fill="#c7e88f">R</text>
      <text x="1060" y="445" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a17">RZN Chrome Extension</text>
      <text x="1060" y="475" text-anchor="middle" font-size="12" font-weight="500" fill="#6f6a60">rides inside your Chrome</text>
    </g>
  </g>

  <!-- Lane 3: External Runtime / Target Surface -->
  <g>
    <rect x="60" y="540" width="1480" height="260" rx="18" fill="#ffffff" stroke="#c6d8f7" stroke-width="1"/>
    <g>
      <rect x="80" y="558" width="10" height="18" rx="3" fill="#4285F4"/>
      <text x="98" y="573" font-size="13" font-weight="700" fill="#1a4596" letter-spacing="1.2">EXTERNAL RUNTIME / TARGET SURFACE</text>
    </g>

    <!-- Google Chrome -->
    <g filter="url(#softShadow)">
      <rect x="920" y="620" width="280" height="150" rx="16" fill="url(#gChrome)" stroke="#4285F4" stroke-width="1.5"/>
      <!-- Chrome mark (simplified) -->
      <g transform="translate(1060, 660)">
        <circle r="22" fill="#ffffff" stroke="#e8e8e8" stroke-width="1"/>
        <path d="M -22 0 A 22 22 0 0 1 11 -19 L 6 -10 A 12 12 0 0 0 -13 7 z" fill="#EA4335"/>
        <path d="M 11 -19 A 22 22 0 0 1 11 19 L 6 10 A 12 12 0 0 0 6 -10 z" fill="#FBBC04"/>
        <path d="M 11 19 A 22 22 0 0 1 -22 0 L -13 -7 A 12 12 0 0 0 6 10 z" fill="#34A853"/>
        <circle r="9" fill="#4285F4"/>
        <circle r="9" fill="none" stroke="#ffffff" stroke-width="2"/>
      </g>
      <text x="1060" y="720" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a17">Google Chrome</text>
      <text x="1060" y="745" text-anchor="middle" font-size="12" font-weight="500" fill="#6f6a60">your existing profile + tabs</text>
    </g>

    <!-- Target Web App -->
    <g filter="url(#softShadow)">
      <rect x="1250" y="620" width="270" height="150" rx="16" fill="#ffffff" stroke="#d9d6cd" stroke-width="1.5"/>
      <g transform="translate(1385, 658)">
        <rect x="-34" y="-14" width="68" height="46" rx="4" fill="#f4f3ee" stroke="#9a9388" stroke-width="1.2"/>
        <rect x="-34" y="-14" width="68" height="12" rx="4" fill="#9a9388"/>
        <circle cx="-28" cy="-8" r="1.8" fill="#ffffff"/>
        <circle cx="-22" cy="-8" r="1.8" fill="#ffffff"/>
        <circle cx="-16" cy="-8" r="1.8" fill="#ffffff"/>
      </g>
      <text x="1385" y="720" text-anchor="middle" font-size="20" font-weight="700" fill="#1a1a17">Target Web App</text>
      <text x="1385" y="745" text-anchor="middle" font-size="12" font-weight="500" fill="#6f6a60">the page being automated</text>
    </g>
  </g>

  <!-- Edges -->
  <!-- User task -> RZN Runtime (enters top edge, never crosses node interior) -->
  <g stroke="#2D2B26" stroke-width="2" fill="none">
    <path d="M 230 282 L 230 360 L 340 360 L 340 390" marker-end="url(#arrow)"/>
  </g>
  <text x="252" y="350" font-size="11" font-weight="600" fill="#6f6a60">routes locally</text>

  <!-- RZN Runtime -> Native Host -->
  <g stroke="#2D2B26" stroke-width="2" fill="none">
    <path d="M 480 445 L 560 445" marker-end="url(#arrow)"/>
  </g>
  <text x="520" y="438" font-size="11" font-weight="600" fill="#6f6a60" text-anchor="middle">IPC</text>

  <!-- Native Host -> Extension -->
  <g stroke="#2D2B26" stroke-width="2" fill="none">
    <path d="M 840 445 L 920 445" marker-end="url(#arrow)"/>
  </g>
  <text x="880" y="438" font-size="11" font-weight="600" fill="#6f6a60" text-anchor="middle">native msg</text>

  <!-- Extension -> Google Chrome -->
  <g stroke="#4285F4" stroke-width="2" fill="none">
    <path d="M 1060 500 L 1060 620" marker-end="url(#arrowBlue)"/>
  </g>
  <text x="1075" y="565" font-size="11" font-weight="700" fill="#4285F4">attaches to real browser</text>

  <!-- Google Chrome -> Target Web App -->
  <g stroke="#2D2B26" stroke-width="2" fill="none">
    <path d="M 1200 695 L 1250 695" marker-end="url(#arrow)"/>
  </g>
  <text x="1225" y="686" font-size="11" font-weight="600" fill="#6f6a60" text-anchor="middle">DOM</text>

  <!-- Footer caption -->
  <text x="800" y="855" text-anchor="middle" font-size="15" font-weight="500" fill="#454039">Browser automation in your existing Chrome profile — local runtime, real browser session.</text>
</svg>
