<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1600 900" width="1600" height="900" font-family="Inter, -apple-system, system-ui, sans-serif">
  <defs>
    <!-- Dot-fill pattern for "agent" capsules — sparser + lighter so text reads cleanly -->
    <pattern id="dotfill" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#ffffff"/>
      <circle cx="7" cy="7" r="0.7" fill="#1a1a17" fill-opacity="0.32"/>
    </pattern>
    <pattern id="dotfillGreen" x="0" y="0" width="14" height="14" patternUnits="userSpaceOnUse">
      <rect width="14" height="14" fill="#f7fbef"/>
      <circle cx="7" cy="7" r="0.7" fill="#3f6f1a" fill-opacity="0.4"/>
    </pattern>

    <!-- Diagonal hatch for sandboxed/scoped containers — very faint -->
    <pattern id="hatch" x="0" y="0" width="9" height="9" patternUnits="userSpaceOnUse" patternTransform="rotate(45)">
      <rect width="9" height="9" fill="#fbfaf4"/>
      <line x1="0" y1="0" x2="0" y2="9" stroke="#1a1a17" stroke-width="0.4" stroke-opacity="0.18"/>
    </pattern>

    <!-- Arrow markers -->
    <marker id="arrowDark" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a17"/>
    </marker>
    <marker id="arrowGreen" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#3f6f1a"/>
    </marker>
    <marker id="arrowSmall" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#1a1a17" fill-opacity="0.7"/>
    </marker>
  </defs>

  <rect width="1600" height="900" fill="#FAFAF7"/>

  <!-- Top-left meta + thesis -->
  <g font-family="'IBM Plex Mono', ui-monospace, 'SF Mono', Menlo, monospace">
    <text x="80" y="72" font-size="11" font-weight="700" fill="#3a352d" letter-spacing="3">RZN  ·  ARCHITECTURE  ·  01</text>
  </g>
  <text x="80" y="128" font-size="38" font-weight="600" fill="#1a1a17" letter-spacing="-0.8">Browser automation that runs on the Chrome you already have.</text>
  <text x="80" y="162" font-size="16" font-weight="400" fill="#2d2a24">A local runtime, a small native bridge, and a Chrome extension that rides inside your real browser session.</text>

  <!-- Top-right RZN monogram badge -->
  <g transform="translate(1488, 56)">
    <rect x="0" y="0" width="56" height="56" rx="14" fill="#1a1a17"/>
    <text x="28" y="36" text-anchor="middle" font-size="18" font-weight="800" fill="#c7e88f" letter-spacing="-0.4">RZN</text>
  </g>

  <!-- Thin section rule -->
  <line x1="80" y1="220" x2="1520" y2="220" stroke="#1a1a17" stroke-width="0.6" stroke-opacity="0.25"/>

  <!-- ========== MAIN FLOW ========== -->

  <!-- Stage labels along the top -->
  <g font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" fill="#3a352d" letter-spacing="2.2">
    <text x="160" y="258">USER</text>
    <text x="500" y="258">RZN RUNTIME · LOCAL</text>
    <text x="1130" y="258">GOOGLE CHROME</text>
    <text x="1410" y="258">TARGET</text>
  </g>

  <!-- =============== USER TASK capsule =============== -->
  <g>
    <!-- capsule body (dot-fill) -->
    <rect x="80" y="430" width="200" height="80" rx="40" fill="url(#dotfill)" stroke="#1a1a17" stroke-width="1.4"/>
    <!-- vertical end-bars (cylinder hint) -->
    <line x1="98" y1="445" x2="98" y2="495" stroke="#1a1a17" stroke-width="1.4"/>
    <line x1="262" y1="445" x2="262" y2="495" stroke="#1a1a17" stroke-width="1.4"/>
    <text x="180" y="473" text-anchor="middle" font-size="18" font-weight="700" fill="#1a1a17" letter-spacing="0.5">USER TASK</text>
    <text x="180" y="495" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2a24" font-family="'IBM Plex Mono', monospace">CLI · workflow · SDK</text>
  </g>

  <!-- =============== RZN RUNTIME container (hatched) =============== -->
  <g>
    <!-- container -->
    <rect x="380" y="310" width="700" height="320" rx="20" fill="url(#hatch)" stroke="#1a1a17" stroke-width="1.2"/>
    <!-- container label tab -->
    <rect x="380" y="290" width="220" height="26" rx="6" fill="#FAFAF7" stroke="#1a1a17" stroke-width="1"/>
    <text x="395" y="308" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" fill="#1a1a17" letter-spacing="2">RZN RUNTIME · LOCAL</text>

    <!-- Three stacked capsule pills inside -->

    <!-- Pill 1: RZN Runtime -->
    <g>
      <rect x="430" y="350" width="600" height="68" rx="34" fill="url(#dotfillGreen)" stroke="#3f6f1a" stroke-width="1.4"/>
      <line x1="450" y1="362" x2="450" y2="406" stroke="#3f6f1a" stroke-width="1.4"/>
      <line x1="1010" y1="362" x2="1010" y2="406" stroke="#3f6f1a" stroke-width="1.4"/>
      <text x="730" y="382" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a17" letter-spacing="0.4">RZN RUNTIME</text>
      <text x="730" y="404" text-anchor="middle" font-size="12" font-weight="600" fill="#26500d" font-family="'IBM Plex Mono', monospace">planner · worker · broker</text>
    </g>

    <!-- arrow down -->
    <line x1="730" y1="425" x2="730" y2="450" stroke="#1a1a17" stroke-width="1.2" marker-end="url(#arrowSmall)"/>
    <text x="745" y="442" font-family="'IBM Plex Mono', monospace" font-size="10" font-weight="700" fill="#2d2a24">IPC</text>

    <!-- Pill 2: Native Host -->
    <g>
      <rect x="430" y="455" width="600" height="68" rx="34" fill="url(#dotfill)" stroke="#1a1a17" stroke-width="1.4"/>
      <line x1="450" y1="467" x2="450" y2="511" stroke="#1a1a17" stroke-width="1.4"/>
      <line x1="1010" y1="467" x2="1010" y2="511" stroke="#1a1a17" stroke-width="1.4"/>
      <text x="730" y="487" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a17" letter-spacing="0.4">RZN NATIVE HOST</text>
      <text x="730" y="509" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2a24" font-family="'IBM Plex Mono', monospace">native messaging bridge</text>
    </g>

    <!-- arrow down -->
    <line x1="730" y1="530" x2="730" y2="555" stroke="#1a1a17" stroke-width="1.2" marker-end="url(#arrowSmall)"/>
    <text x="745" y="547" font-family="'IBM Plex Mono', monospace" font-size="10" font-weight="700" fill="#2d2a24">native msg</text>

    <!-- Pill 3: Chrome Extension -->
    <g>
      <rect x="430" y="560" width="600" height="68" rx="34" fill="url(#dotfill)" stroke="#1a1a17" stroke-width="1.4"/>
      <line x1="450" y1="572" x2="450" y2="616" stroke="#1a1a17" stroke-width="1.4"/>
      <line x1="1010" y1="572" x2="1010" y2="616" stroke="#1a1a17" stroke-width="1.4"/>
      <text x="730" y="592" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a17" letter-spacing="0.4">RZN CHROME EXTENSION</text>
      <text x="730" y="614" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2a24" font-family="'IBM Plex Mono', monospace">rides inside your Chrome</text>
    </g>
  </g>

  <!-- =============== GOOGLE CHROME capsule =============== -->
  <g>
    <rect x="1140" y="430" width="240" height="80" rx="40" fill="url(#dotfill)" stroke="#1a1a17" stroke-width="1.4"/>
    <line x1="1158" y1="445" x2="1158" y2="495" stroke="#1a1a17" stroke-width="1.4"/>
    <line x1="1362" y1="445" x2="1362" y2="495" stroke="#1a1a17" stroke-width="1.4"/>

    <!-- Chrome glyph (small, monochrome) -->
    <g transform="translate(1186, 470)">
      <circle r="14" fill="#FAFAF7" stroke="#1a1a17" stroke-width="1.2"/>
      <circle r="5" fill="none" stroke="#1a1a17" stroke-width="1.2"/>
      <line x1="-14" y1="0" x2="-5" y2="0" stroke="#1a1a17" stroke-width="1"/>
      <line x1="2.5" y1="-4.3" x2="11.4" y2="-9.5" stroke="#1a1a17" stroke-width="1"/>
      <line x1="2.5" y1="4.3" x2="11.4" y2="9.5" stroke="#1a1a17" stroke-width="1"/>
    </g>

    <text x="1270" y="467" text-anchor="middle" font-size="17" font-weight="700" fill="#1a1a17" letter-spacing="0.4">GOOGLE CHROME</text>
    <text x="1270" y="490" text-anchor="middle" font-size="12" font-weight="600" fill="#2d2a24" font-family="'IBM Plex Mono', monospace">your profile · cookies · tabs</text>
  </g>

  <!-- =============== TARGET WEB card =============== -->
  <g>
    <rect x="1420" y="410" width="120" height="120" rx="14" fill="#ffffff" stroke="#1a1a17" stroke-width="1.2"/>
    <!-- browser chrome -->
    <rect x="1420" y="410" width="120" height="22" rx="14" fill="#1a1a17" fill-opacity="0.06"/>
    <rect x="1420" y="421" width="120" height="11" fill="#1a1a17" fill-opacity="0.06"/>
    <circle cx="1432" cy="421" r="2.4" fill="#1a1a17" fill-opacity="0.4"/>
    <circle cx="1442" cy="421" r="2.4" fill="#1a1a17" fill-opacity="0.4"/>
    <circle cx="1452" cy="421" r="2.4" fill="#1a1a17" fill-opacity="0.4"/>
    <!-- page lines -->
    <rect x="1432" y="448" width="60" height="6" rx="2" fill="#1a1a17" fill-opacity="0.18"/>
    <rect x="1432" y="462" width="96" height="3" rx="1" fill="#1a1a17" fill-opacity="0.12"/>
    <rect x="1432" y="470" width="84" height="3" rx="1" fill="#1a1a17" fill-opacity="0.12"/>
    <rect x="1432" y="478" width="92" height="3" rx="1" fill="#1a1a17" fill-opacity="0.12"/>
    <rect x="1432" y="494" width="40" height="14" rx="3" fill="#3f6f1a" fill-opacity="0.55"/>
    <text x="1480" y="552" text-anchor="middle" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" fill="#1a1a17" letter-spacing="1">TARGET WEB</text>
  </g>

  <!-- =============== Smooth Bézier connectors =============== -->

  <!-- USER TASK -> RZN Runtime container (curve in from left) -->
  <path d="M 280 470 C 330 470, 330 384, 430 384" fill="none" stroke="#1a1a17" stroke-width="1.5" marker-end="url(#arrowDark)"/>
  <text x="295" y="438" font-family="'IBM Plex Mono', monospace" font-size="10" font-weight="700" fill="#2d2a24">routes locally</text>

  <!-- RZN Chrome Extension -> Google Chrome (curve out to right, accent green) -->
  <path d="M 1030 594 C 1110 594, 1110 470, 1140 470" fill="none" stroke="#3f6f1a" stroke-width="1.8" marker-end="url(#arrowGreen)"/>
  <text x="1048" y="538" font-family="'IBM Plex Mono', monospace" font-size="11" font-weight="700" fill="#26500d">attaches to real browser</text>

  <!-- Google Chrome -> Target Web -->
  <path d="M 1380 470 L 1420 470" fill="none" stroke="#1a1a17" stroke-width="1.5" marker-end="url(#arrowDark)"/>

  <!-- =============== Bottom legend & caption =============== -->
  <line x1="80" y1="700" x2="1520" y2="700" stroke="#1a1a17" stroke-width="0.5" stroke-opacity="0.25" stroke-dasharray="2 4"/>

  <g transform="translate(80, 740)" font-family="'IBM Plex Mono', monospace">
    <text x="0" y="0" font-size="11" font-weight="700" fill="#3a352d" letter-spacing="2">LEGEND</text>

    <!-- swatch 1: dot-fill -->
    <g transform="translate(0, 22)">
      <rect x="0" y="0" width="36" height="22" rx="11" fill="url(#dotfill)" stroke="#1a1a17" stroke-width="1.2"/>
      <line x1="4" y1="3" x2="4" y2="19" stroke="#1a1a17" stroke-width="1.2"/>
      <line x1="32" y1="3" x2="32" y2="19" stroke="#1a1a17" stroke-width="1.2"/>
      <text x="50" y="16" font-size="12" font-weight="500" fill="#1a1a17">runtime component (executes work)</text>
    </g>

    <!-- swatch 2: hatched container -->
    <g transform="translate(420, 22)">
      <rect x="0" y="0" width="36" height="22" rx="6" fill="url(#hatch)" stroke="#1a1a17" stroke-width="1"/>
      <text x="50" y="16" font-size="12" font-weight="500" fill="#1a1a17">local trust boundary</text>
    </g>

    <!-- swatch 3: green accent -->
    <g transform="translate(720, 22)">
      <rect x="0" y="0" width="36" height="22" rx="11" fill="url(#dotfillGreen)" stroke="#3f6f1a" stroke-width="1.2"/>
      <line x1="4" y1="3" x2="4" y2="19" stroke="#3f6f1a" stroke-width="1.2"/>
      <line x1="32" y1="3" x2="32" y2="19" stroke="#3f6f1a" stroke-width="1.2"/>
      <text x="50" y="16" font-size="12" font-weight="500" fill="#1a1a17">RZN-authored entry point</text>
    </g>
  </g>

  <!-- Three keep-in-mind statements -->
  <g transform="translate(80, 820)" font-family="Georgia, serif">
    <text x="0" y="0" font-size="14" fill="#1a1a17">RZN is <tspan font-style="italic">not</tspan> a browser. It is the runtime that talks to your browser.</text>
    <text x="0" y="22" font-size="14" fill="#1a1a17">Your Chrome session stays exactly as it is — same profile, same cookies, same tabs.</text>
    <text x="0" y="44" font-size="14" fill="#1a1a17">Workflow mode and agent mode share the same execution stack and the same browser.</text>
  </g>

  <!-- Bottom-right meta -->
  <text x="1520" y="876" text-anchor="end" font-family="'IBM Plex Mono', monospace" font-size="10" font-weight="700" fill="#3a352d" letter-spacing="1.5">LOCAL RUNTIME · REAL BROWSER SESSION</text>
</svg>
