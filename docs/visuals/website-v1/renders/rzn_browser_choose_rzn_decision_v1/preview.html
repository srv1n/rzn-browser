<!doctype html>
<html>
<head>
  <meta charset="utf-8" />
  <style>
    :root {
  --bg-start: #0F1823;
  --bg-end: #28394B;
  --surface: rgba(25, 38, 52, 0.84);
  --surface-strong: rgba(31, 47, 64, 0.94);
  --surface-soft: rgba(23, 35, 47, 0.76);
  --border: rgba(207, 227, 242, 0.16);
  --text: #F6F8FB;
  --text-muted: #B1C1D0;
  --accent: #7CC0F1;
  --accent-soft: #3C7FB1;
  --proof-label: #8BC9F3;
  --proof-value: #F6F8FB;
  --font-display: "Iowan Old Style", "Palatino Linotype", "Book Antiqua", Georgia, serif;
  --font-body: "Avenir Next", "Helvetica Neue", Arial, sans-serif;
  --font-label: "SF Pro Display", "Avenir Next", "Helvetica Neue", Arial, sans-serif;
  --display-weight: 700;
  --body-weight: 600;
  --label-weight: 700;
  --text-shadow: 0 2px 16px rgba(0,0,0,0.22);
  --grain-opacity: 0.04;
}
    * {
      box-sizing: border-box;
    }
    html, body {
      margin: 0;
      padding: 0;
      width: 1400px;
      height: 900px;
      overflow: hidden;
      background: linear-gradient(
        135deg,
        color-mix(in srgb, var(--bg-start) 92%, white 8%),
        color-mix(in srgb, var(--bg-end) 94%, black 6%)
      );
      color: var(--text);
    }
    body {
      position: relative;
      font-family: var(--font-body);
      -webkit-font-smoothing: antialiased;
      text-rendering: geometricPrecision;
    }
    body::before {
      content: "";
      position: absolute;
      inset: 0;
      background:
        radial-gradient(circle at 14% 12%, color-mix(in srgb, var(--accent-soft) 30%, white 12%), transparent 32%),
        radial-gradient(circle at 86% 16%, color-mix(in srgb, var(--surface-strong) 64%, white 18%), transparent 24%),
        radial-gradient(circle at 50% 100%, color-mix(in srgb, var(--bg-end) 18%, transparent), transparent 42%),
        linear-gradient(180deg, rgba(255,255,255,0.16), rgba(255,255,255,0.00) 24%, rgba(255,255,255,0.03) 100%);
      opacity: 0.98;
      pointer-events: none;
    }
    body::after {
      content: "";
      position: absolute;
      inset: 0;
      background-image:
        radial-gradient(rgba(255,255,255,0.20) 0.7px, transparent 0.7px),
        radial-gradient(rgba(0,0,0,0.05) 0.7px, transparent 0.7px);
      background-position: 0 0, 9px 9px;
      background-size: 18px 18px;
      opacity: calc(var(--grain-opacity) * 0.72);
      mix-blend-mode: soft-light;
      pointer-events: none;
    }
    .panel {
      position: absolute;
      border: 1px solid var(--border);
      background: linear-gradient(
        180deg,
        color-mix(in srgb, var(--surface-strong) 96%, white 4%),
        color-mix(in srgb, var(--surface) 90%, var(--bg-end) 10%)
      );
      backdrop-filter: blur(10px) saturate(108%);
      box-shadow:
        0 26px 80px rgba(20, 16, 13, 0.12),
        inset 0 1px 0 rgba(255,255,255,0.46);
      border-radius: 30px;
    }
    .slot {
      position: absolute;
      overflow: hidden;
      white-space: normal;
      word-break: break-word;
      display: block;
    }
    .slot.eyebrow {
      font-family: var(--font-label);
      font-size: 20px;
      line-height: 1.15;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      color: var(--accent);
      font-weight: var(--label-weight);
    }
    .slot.title {
      font-family: var(--font-display);
      color: var(--text);
      font-size: 80px;
      line-height: 0.99;
      letter-spacing: -0.035em;
      font-weight: var(--display-weight);
      text-wrap: balance;
      text-shadow: var(--text-shadow);
    }
    .slot.subtitle {
      font-family: var(--font-body);
      color: var(--text-muted);
      font-size: 26px;
      line-height: 1.28;
      font-weight: var(--body-weight);
    }
    .slot.footer {
      font-family: var(--font-label);
      color: color-mix(in srgb, var(--text-muted) 88%, white);
      font-size: 18px;
      line-height: 1.1;
      font-weight: 600;
      letter-spacing: 0.01em;
    }
    .slot.proof-label {
      font-family: var(--font-label);
      color: var(--proof-label);
      font-size: 15px;
      line-height: 1.1;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.11em;
    }
    .slot.proof-value {
      font-family: var(--font-display);
      color: var(--proof-value);
      font-size: 32px;
      line-height: 1.01;
      font-weight: 700;
      letter-spacing: -0.02em;
    }
    .slot.matrix-cell {
      font-family: var(--font-body);
      color: var(--text);
      font-size: 22px;
      line-height: 1.22;
      font-weight: var(--body-weight);
    }
    .slot.matrix-header {
      font-family: var(--font-label);
      color: var(--accent);
      font-size: 18px;
      line-height: 1.12;
      font-weight: var(--label-weight);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }
    .slot.node-title {
      font-family: var(--font-display);
      color: var(--text);
      font-size: 34px;
      line-height: 1.04;
      letter-spacing: -0.025em;
      font-weight: var(--display-weight);
      text-align: center;
    }
    .slot.node-body {
      font-family: var(--font-body);
      color: var(--text-muted);
      font-size: 21px;
      line-height: 1.22;
      font-weight: var(--body-weight);
      text-align: center;
    }
    .slot.callout-kicker {
      font-family: var(--font-label);
      color: var(--accent);
      font-size: 13px;
      line-height: 1.08;
      font-weight: var(--label-weight);
      letter-spacing: 0.08em;
      text-transform: uppercase;
    }
    .slot.callout-title {
      font-family: var(--font-display);
      color: var(--text);
      font-size: 22px;
      line-height: 1.06;
      font-weight: var(--display-weight);
      letter-spacing: -0.02em;
    }
    .slot.callout-body {
      font-family: var(--font-body);
      color: var(--text-muted);
      font-size: 17px;
      line-height: 1.22;
      font-weight: var(--body-weight);
    }
  </style>
</head>
<body>
