<svg id="decision-diagram-svg" xmlns="http://www.w3.org/2000/svg" width="1400" height="900" viewBox="0 0 1400 900"><defs><linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%"><stop offset="0%" stop-color="#0F1823"></stop><stop offset="100%" stop-color="#28394B"></stop></linearGradient><radialGradient id="glow" cx="18%" cy="10%" r="72%"><stop offset="0%" stop-color="#3C7FB1" stop-opacity="0.30"></stop><stop offset="100%" stop-color="transparent" stop-opacity="0"></stop></radialGradient></defs><rect x="0" y="0" width="1400" height="900" rx="0" fill="url(#bg)"></rect><rect x="0" y="0" width="1400" height="900" rx="0" fill="url(#glow)"></rect><rect x="44" y="44" width="1312" height="812" rx="38" fill="rgba(23, 35, 47, 0.76)" stroke="rgba(207, 227, 242, 0.16)" stroke-width="1.5"></rect><foreignObject x="86" y="76" width="320" height="22"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;"><div id="slot-eyebrow" data-slot="eyebrow" class="slot eyebrow" style="position: static; width: 100%; height: 100%; line-height: 1.1; white-space: nowrap; font-size: 18px;">Decision guide</div></div></foreignObject><foreignObject x="82" y="102" width="1236" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;"><div id="slot-title" data-slot="title" class="slot title" style="position: static; width: 100%; height: 100%; font-size: 61px; line-height: 0.98; white-space: normal;">Choose RZN when local Chrome is the point</div></div></foreignObject><foreignObject x="86" y="178" width="1228" height="34"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;"><div id="slot-subtitle" data-slot="subtitle" class="slot subtitle" style="position: static; width: 100%; height: 100%; font-size: 22px; line-height: 1.22; white-space: normal;">If you need a hosted browser fleet, use something else. RZN wins when the real session matters.</div></div></foreignObject><path d="M 700.0 366.0 Q 700.0 396.0 212.5 546.0" stroke="#7CC0F1