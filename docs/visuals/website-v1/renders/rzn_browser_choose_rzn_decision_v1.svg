er;justify-content:center;"><div id="slot-proof-branches-0--label" data-slot="proof.branches[0].label" class="slot node-title" style="position: static; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 34px; line-height: 1.06; white-space: nowrap;">Real session</div></div></foreignObject><foreignObject x="86" y="652" width="253" height="140"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;"><div id="slot-proof-branches-0--value" data-slot="proof.branches[0].value" class="slot node-body" style="position: static; width: 100%; height: 100%; line-height: 1.22; white-space: normal; font-size: 22px;">Use RZN when cookies, tabs, and extensions need to stay put.</div></div></foreignObject><foreignObject x="411" y="574" width="253" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><div id="slot-proof-branches-1--label" data-slot="proof.branches[1].label" class="slot node-title" style="position: static; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 34px; line-height: 1.06; white-space: nowrap;">Repeatable</div></div></foreignObject><foreignObject x="411" y="652" width="253" height="140"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;"><div id="slot-proof-branches-1--value" data-slot="proof.branches[1].value" class="slot node-body" style="position: static; width: 100%; height: 100%; line-height: 1.22; white-space: normal; font-size: 22px;">Start with workflows when the task should run the same way every time.</div></div></foreignObject><foreignObject x="736" y="574" width="253" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><div id="slot-proof-branches-2--label" data-slot="proof.branches[2].label" class="slot node-title" style="position: static; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 34px; line-height: 1.06; white-space: nowrap;">Goal-based</div></div></foreignObject><foreignObject x="736" y="652" width="253" height="140"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;"><div id="slot-proof-branches-2--value" data-slot="proof.branches[2].value" class="slot node-body" style="position: static; width: 100%; height: 100%; line-height: 1.22; white-space: normal; font-size: 22px;">Use llm-auto when the browser must adapt instead of following fixed steps.</div></div></foreignObject><foreignObject x="1061" y="574" width="253" height="72"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:center;justify-content:center;"><div id="slot-proof-branches-3--label" data-slot="proof.branches[3].label" class="slot node-title" style="position: static; width: 100%; height: 100%; display: flex; align-items: center; justify-content: center; font-size: 34px; line-height: 1.06; white-space: nowrap;">Cloud scale</div></div></foreignObject><foreignObject x="1061" y="652" width="253" height="140"><div xmlns="http://www.w3.org/1999/xhtml" style="width:100%;height:100%;display:flex;align-items:flex-start;justify-content:center;"><div id="slot-proof-branches-3--value" data-slot="proof.branches[3].value" class="slot node-body" style="position: static; width: 100%; height: 100%; line-height: 1.22; white-space: normal; font-size: 22px;">Pick a cloud platform when the job is hosted browser infrastructure.</div></div></foreignObject></svg>